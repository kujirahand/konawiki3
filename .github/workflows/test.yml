name: Test

on:
  push:
  pull_request:

jobs:
  php-tests:
    name: PHP tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Run tests
        run: php kona3engine/tests/test_main.php go_test
